name: FitRock
options:
  bundleIdPrefix: com.JerryX
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait

packages:
  SQLite:
    url: https://github.com/stephencelis/SQLite.swift
    from: "0.15.0"

targets:
  FitRock:
    type: application
    platform: iOS
    sources:
      - path: FitRock
        excludes:
          - free-exercise-db-main/**
          - Resources/Data/**
          - Resources/ExerciseImages/**
      - path: FitRock/Resources/Data
        type: folder
      - path: FitRock/Resources/ExerciseImages
        type: folder
    dependencies:
      - package: SQLite
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.JerryX.FitRock
        DEVELOPMENT_TEAM: 9W9DQ54BVY
        INFOPLIST_KEY_CFBundleDisplayName: FitRock
        INFOPLIST_KEY_NSHealthShareUsageDescription: FitRock 会在你授权后读取体重、心率、静息心率和活动能量，仅用于本机生成训练计划建议和统计参考；拒绝授权不影响记录训练。
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: FitRock/FitRock.entitlements
      properties:
        com.apple.developer.healthkit: true

  FitRockTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - FitRockTests
    dependencies:
      - target: FitRock
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fitrock.FitRockTests
        GENERATE_INFOPLIST_FILE: YES

  FitRockUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - FitRockUITests
    dependencies:
      - target: FitRock
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.fitrock.FitRockUITests
        GENERATE_INFOPLIST_FILE: YES
